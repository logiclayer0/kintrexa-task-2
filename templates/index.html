<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kintrexa | Developer Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1e293b !important; border-bottom: 1px solid #334155; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-4px); border-color: #3b82f6; }
        .btn-primary { background-color: #2563eb; border: none; border-radius: 8px; }
        .btn-primary:hover { background-color: #1d4ed8; }
        footer { border-top: 1px solid #334155; color: #94a3b8; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/">KINTREXA TASK 2</a>
            <a href="/create" class="btn btn-primary btn-sm px-4">Create New Post</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="mb-4">
                    <h2 class="fw-bold">Latest Publications</h2>
                    <p class="text-muted">Explore updates, system designs, and task submissions.</p>
                </div>

                {% for post in posts %}
                <div class="card shadow-sm mb-4">
                    <div class="card-body p-4">
                        <h4 class="card-title fw-bold text-white mb-3">{{ post.title }}</h4>
                        <p class="card-text text-secondary" style="line-height: 1.6;">{{ post.content }}</p>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <footer class="text-center py-4 mt-5">
        <div class="container">
            <small>&copy; 2026 Kintrexa Software Private Limited. All Rights Reserved.</small>
        </div>
    </footer>

</body>
</html>
