<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post | Kintrexa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1e293b !important; border-bottom: 1px solid #334155; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .form-control { background-color: #0f172a; border: 1px solid #334155; color: #f8fafc; border-radius: 8px; }
        .form-control:focus { background-color: #0f172a; color: #f8fafc; border-color: #3b82f6; box-shadow: none; }
        .btn-success { background-color: #10b981; border: none; border-radius: 8px; }
        .btn-success:hover { background-color: #059669; }
        .text-link { color: #94a3b8; text-decoration: none; }
        .text-link:hover { color: #3b82f6; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/">KINTREXA TASK 2</a>
            <a href="/" class="text-link small">Back to Home</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h3 class="fw-bold text-white mb-4">Publish Article</h3>
                        
                        <form action="/create" method="POST">
                            <div class="mb-4">
                                <label class="form-label text-secondary fw-semibold">Article Title</label>
                                <input type="text" class="form-control form-control-lg" name="title" placeholder="Enter title here..." required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label text-secondary fw-semibold">Content Body</label>
                                <textarea class="form-control" name="content" rows="6" placeholder="Write your content narrative..." required></textarea>
                            </div>
                            
                            <button type="submit" class="btn btn-success btn-lg w-100 fw-bold shadow-sm">Submit Article</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
